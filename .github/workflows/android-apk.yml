name: Build Admin APK

# Builds the Musk-IT admin/staff WebView app into an installable APK.
# - Always builds a debug APK (installable immediately for testing).
# - Builds a signed release APK when signing secrets are configured.
on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile-admin/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch: {}

permissions:
  contents: write

defaults:
  run:
    working-directory: mobile-admin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Prepare release keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Release keystore configured."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No ANDROID_KEYSTORE_BASE64 secret set; skipping signed release build."
          fi

      - name: Build signed release APK
        if: ${{ steps.keystore.outputs.present == 'true' }}
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: muskit-admin-debug
          path: mobile-admin/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: ${{ steps.keystore.outputs.present == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: muskit-admin-release
          path: mobile-admin/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Attach APKs to GitHub Release (on tag)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile-admin/app/build/outputs/apk/debug/*.apk
            mobile-admin/app/build/outputs/apk/release/*.apk
