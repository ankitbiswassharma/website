name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
      TARGET_SHA: ${{ github.sha }}
    steps:
      - name: Deploy over SSH
        shell: bash
        run: |
          set -euo pipefail

          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          port="${DEPLOY_PORT:-22}"
          branch="${DEPLOY_BRANCH:-main}"

          # Defend against secrets pasted with whitespace or a URL scheme.
          DEPLOY_HOST="${DEPLOY_HOST#http://}"
          DEPLOY_HOST="${DEPLOY_HOST#https://}"
          DEPLOY_HOST="${DEPLOY_HOST%%/*}"
          DEPLOY_HOST="${DEPLOY_HOST//[[:space:]]/}"
          port="${port//[[:space:]]/}"

          if ! [[ "$port" =~ ^[0-9]+$ ]]; then
            echo "::error::DEPLOY_PORT is not a valid number: '${port}'. Unset the secret to default to 22."
            exit 1
          fi

          echo "Preparing SSH deploy to ${DEPLOY_USER}@${DEPLOY_HOST}:${port}"
          echo "Deploy branch: ${branch}"
          echo "Target SHA: ${TARGET_SHA}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "Validating SSH private key"
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

          echo "Adding host key for ${DEPLOY_HOST}:${port}"
          # ssh-keyscan can exit non-zero when the host is unreachable. Don't let
          # that abort the job with a cryptic code — capture it and let the real
          # connection test below report the actual error.
          if ! ssh-keyscan -T 10 -p "$port" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/tmp/keyscan.log; then
            echo "::warning::ssh-keyscan could not retrieve a host key from ${DEPLOY_HOST}:${port}. The runner may be unable to reach the server's SSH port."
          fi
          if [ -s /tmp/keyscan.log ]; then
            echo "ssh-keyscan diagnostics:"
            cat /tmp/keyscan.log
          fi
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "No host key collected — relying on StrictHostKeyChecking=accept-new for the first connection."
          fi

          echo "Testing SSH connection"
          ssh -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/deploy_key \
            -p "$port" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "echo SSH connection OK"

          echo "Running remote deploy"
          ssh -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/deploy_key -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_BRANCH='$branch' TARGET_SHA='$TARGET_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          echo "Deploy path: $DEPLOY_PATH"
          echo "Target branch: $DEPLOY_BRANCH"
          echo "Target SHA: $TARGET_SHA"
          echo "Before deploy: $(git rev-parse --short HEAD)"

          git fetch --prune origin "$DEPLOY_BRANCH"

          remote_sha="$(git rev-parse "origin/$DEPLOY_BRANCH")"
          if [ "$remote_sha" != "$TARGET_SHA" ]; then
            echo "origin/$DEPLOY_BRANCH is $remote_sha, expected $TARGET_SHA"
            echo "Check that DEPLOY_PATH points to the same GitHub repository and branch."
            exit 1
          fi

          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "Deployment checkout has tracked local changes. Commit or stash them before deploying."
            git status --short --untracked-files=no
            exit 1
          fi

          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "Preserving server-only untracked files:"
            git status --short --untracked-files=all
          fi

          git checkout "$DEPLOY_BRANCH"
          git reset --hard "$TARGET_SHA"

          echo "After deploy: $(git rev-parse --short HEAD)"
          docker compose up --build -d --remove-orphans
          docker compose ps
          REMOTE
