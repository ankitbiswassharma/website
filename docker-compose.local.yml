# Local development compose: no Traefik, clone-friendly defaults, ports exposed directly.
# Usage: docker compose -f docker-compose.local.yml up --build

services:
  db:
    image: postgres:16-alpine
    container_name: muskit_local_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-muskit_platform}
      POSTGRES_USER: ${POSTGRES_USER:-muskit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-muskit_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-muskit} -d ${POSTGRES_DB:-muskit_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: muskit_local_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      BACKEND_PORT: 8000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000,http://127.0.0.1:3000
      API_BASE_URL: http://localhost:8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-muskit}:${POSTGRES_PASSWORD:-muskit_local_password}@db:5432/${POSTGRES_DB:-muskit_platform}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-this-local-secret}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-none}
      # Shared HMAC secret for inbound ERP purchase sync (match the ERP's
      # WEBSITE_PURCHASE_SYNC_SECRET to test the integration locally).
      INTEGRATIONS_INBOUND_SECRET: ${INTEGRATIONS_INBOUND_SECRET:-local-dev-secret}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_local_storage:/app/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        INTERNAL_API_BASE_URL: http://backend:8000
    container_name: muskit_local_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      INTERNAL_API_BASE_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_local_data:
  backend_local_storage:
