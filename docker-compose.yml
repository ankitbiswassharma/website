services:
  db:
    image: postgres:16-alpine
    container_name: muskit_website_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-muskit_platform}
      POSTGRES_USER: ${POSTGRES_USER:-muskit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-muskit} -d ${POSTGRES_DB:-muskit_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: muskit_website_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      BACKEND_PORT: 8000
      FRONTEND_URL: ${FRONTEND_URL:-https://muskit.in}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://muskit.in,https://www.muskit.in,http://76.13.246.57}
      API_BASE_URL: ${API_BASE_URL:-https://muskit.in}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-muskit}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-muskit_platform}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?Set ADMIN_SESSION_SECRET in .env}
      EMAIL_PROVIDER: smtp
      SMTP_HOST: ${SMTP_HOST:-smtpout.secureserver.net}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-ssl}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER to your GoDaddy email address}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?Set SMTP_PASSWORD to your GoDaddy SMTP password}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Musk-IT}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    expose:
      - "8000"
    volumes:
      - backend_storage:/app/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        INTERNAL_API_BASE_URL: http://backend:8000
    container_name: muskit_website_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      INTERNAL_API_BASE_URL: http://backend:8000
    expose:
      - "3000"

  traefik:
    image: traefik:v3.1
    container_name: muskit_website_traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_CERT_EMAIL:?Set TRAEFIK_CERT_EMAIL in .env}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_letsencrypt:/letsencrypt

volumes:
  postgres_data:
  backend_storage:
  traefik_letsencrypt:
