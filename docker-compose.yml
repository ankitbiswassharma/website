services:
  db:
    image: postgres:16-alpine
    container_name: muskit_website_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: muskit_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d muskit_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: muskit_website_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      BACKEND_PORT: 8000
      FRONTEND_URL: http://localhost:3000
      API_BASE_URL: http://localhost:8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/muskit_platform
      ADMIN_SESSION_SECRET: change-this-local-secret
      ALLOW_DEV_OTP_FALLBACK: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_storage:/app/app/storage

  frontend:
    build:
      context: ./frontend
    container_name: muskit_website_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  postgres_data:
  backend_storage:
  frontend_node_modules:
  frontend_next:
