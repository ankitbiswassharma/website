services:
  db:
    image: postgres:16-alpine
    container_name: muskit_website_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: muskit_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d muskit_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: muskit_website_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      BACKEND_PORT: 8000
      FRONTEND_URL: https://muskit.in
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,https://muskit.in,https://www.muskit.in
      API_BASE_URL: https://muskit.in
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/muskit_platform
      ADMIN_SESSION_SECRET: change-this-local-secret
      ALLOW_DEV_OTP_FALLBACK: "false"
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    container_name: muskit_website_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_storage:
