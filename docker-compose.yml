services:
  db:
    image: postgres:16-alpine
    container_name: muskit_website_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-muskit_platform}
      POSTGRES_USER: ${POSTGRES_USER:-muskit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-muskit} -d ${POSTGRES_DB:-muskit_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: muskit_website_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      BACKEND_PORT: 8000
      FRONTEND_URL: ${FRONTEND_URL:-http://76.13.246.57}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://76.13.246.57,http://76.13.246.57:3000,https://muskit.in,https://www.muskit.in}
      API_BASE_URL: ${API_BASE_URL:-http://76.13.246.57}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-muskit}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-muskit_platform}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?Set ADMIN_SESSION_SECRET in .env}
      EMAIL_PROVIDER: smtp
      SMTP_HOST: ${SMTP_HOST:-smtpout.secureserver.net}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-ssl}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER to your GoDaddy email address}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?Set SMTP_PASSWORD to your GoDaddy SMTP password}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Musk-IT}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    expose:
      - "8000"
    volumes:
      - backend_storage:/app/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        INTERNAL_API_BASE_URL: http://backend:8000
    container_name: muskit_website_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      INTERNAL_API_BASE_URL: http://backend:8000
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: muskit_website_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  backend_storage:
