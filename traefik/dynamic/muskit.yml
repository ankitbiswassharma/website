http:
  routers:
    muskit-api:
      rule: "(Host(`muskit.in`) || Host(`www.muskit.in`)) && PathPrefix(`/api/v1`)"
      entryPoints:
        - websecure
      service: muskit-api
      priority: 100
      middlewares:
        - security-headers
      tls:
        certResolver: letsencrypt

    muskit-frontend:
      rule: "Host(`muskit.in`) || Host(`www.muskit.in`)"
      entryPoints:
        - websecure
      service: muskit-frontend
      priority: 1
      middlewares:
        - security-headers
      tls:
        certResolver: letsencrypt

  middlewares:
    security-headers:
      headers:
        # HSTS: browsers refuse plain-HTTP for a year after first visit.
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        # No MIME sniffing, no framing by other sites (clickjacking).
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"
        # CSP notes:
        # - 'unsafe-inline' script/style is required by Next.js bootstrap and
        #   the JsonLd/consent components; tighten to nonces later if desired.
        # - *.razorpay.com covers checkout.js, its iframe, and its telemetry
        #   (lumberjack.razorpay.com) used by the payment page.
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self' 'unsafe-inline' https://*.razorpay.com;
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: https:;
          font-src 'self' data:;
          connect-src 'self' https://*.razorpay.com;
          frame-src https://*.razorpay.com;
          object-src 'none';
          base-uri 'self';
          form-action 'self';
          frame-ancestors 'none'

  services:
    muskit-api:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    muskit-frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"
